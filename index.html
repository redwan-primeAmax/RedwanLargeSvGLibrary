<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SVG Viewer – গিটহাব পেজ ফিক্স</title>
  <!-- JSZip Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: radial-gradient(circle at 10% 20%, #0e1428, #050814);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* === মোবাইল ফার্স্ট স্টাইল === */
    .selector-bar {
      background: #0a0f1e;
      border-bottom: 1px solid #2a3366;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .library-select {
      width: 100%;
      background: #111a36;
      border: 1px solid #3a4790;
      padding: 10px 14px;
      border-radius: 40px;
      color: white;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }
    .status-badge {
      background: #0f1430;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #bbd4ff;
      border: 1px solid #1f2a4e;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* হেডার ও কন্ট্রোলস */
    .library-header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(16px);
      background: rgba(9, 14, 26, 0.92);
      border-bottom: 1px solid #2a3366;
      padding: 12px 16px;
    }
    .title-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 1.25rem;
      background: linear-gradient(135deg, #d6e2ff, #8aa6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }
    .badge {
      background: #111a36;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.75rem;
      border: 1px solid #202b54;
      white-space: nowrap;
    }
    
    /* ক্যাটাগরি স্ট্রিপ */
    .category-strip {
      overflow-x: auto;
      white-space: nowrap;
      margin: 8px 0;
      padding-bottom: 8px;
      -webkit-overflow-scrolling: touch;
    }
    .category-strip::-webkit-scrollbar {
      display: none;
    }
    .cat-btn {
      background: #0f162f;
      border: 1px solid #2c3870;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      margin-right: 8px;
      cursor: pointer;
      display: inline-block;
      color: #bbd4ff;
      transition: 0.2s;
    }
    .cat-btn.active {
      background: #3c6eff;
      border-color: white;
      color: white;
    }

    /* সার্চ এবং অ্যাকশন বাটন */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 8px 0;
    }
    .search-input {
      width: 100%;
      background: #0f162f;
      border: 1px solid #2c3870;
      padding: 10px 16px;
      border-radius: 40px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    .search-input:focus {
      border-color: #3c6eff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      background: #111a36;
      border: 1px solid #3a4790;
      padding: 10px 14px;
      border-radius: 40px;
      cursor: pointer;
      color: white;
      font-size: 0.85rem;
      font-weight: 500;
      text-align: center;
    }
    .btn-primary {
      background: linear-gradient(105deg, #3c6eff, #5f3af0);
      border: none;
    }
    .info-tag {
      font-size: 10px;
      color: #8aa6ff;
      margin-top: 4px;
      text-align: center;
    }

    /* আইকন গ্রিড */
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 16px;
    }
    .icon-card {
      background: rgba(15, 24, 48, 0.8);
      border-radius: 16px;
      border: 1px solid #2c3a70;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      padding: 10px;
    }
    .icon-card:active {
      transform: scale(0.95);
    }
    .icon-card img {
      width: 50%;
      height: 50%;
      object-fit: contain;
    }
    .icon-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(5, 8, 20, 0.95), transparent);
      font-size: 0.65rem;
      padding: 8px 6px 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }
    .copy-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #22c55e;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }
    .icon-card.copied-flash .copy-badge {
      display: flex;
    }

    /* স্ট্যাটাস ও নোটিফিকেশন */
    .status-area {
      text-align: center;
      padding: 2rem 1rem;
      color: #9aa9e0;
      font-size: 0.9rem;
    }
    .load-more-hint {
      text-align: center;
      margin: 10px 0 25px;
      font-size: 0.75rem;
      color: #6375b3;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(28, 45, 85, 0.95);
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 40px;
      font-size: 0.85rem;
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 200;
      white-space: nowrap;
      border: 1px solid #3c6eff;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* রেসপনসিভ ব্রেকপয়েন্ট */
    @media (min-width: 480px) {
      .icon-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    }
    @media (min-width: 768px) {
      .selector-bar { flex-direction: row; align-items: center; padding: 14px 24px; }
      .library-select { width: 300px; }
      .library-header { padding: 16px 24px; }
      .controls { flex-direction: row; align-items: center; }
      .search-input { flex: 2; }
      .btn-group { flex: 1; }
      .icon-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; }
      h1 { font-size: 1.6rem; }
    }
    @media (min-width: 1024px) {
      .icon-grid { grid-template-columns: repeat(6, 1fr); }
    }
  </style>
</head>
<body>

<div class="selector-bar">
  <!-- ফিক্সড: গিটহাব পেজেসের জন্য রিলেティブ পাথ (শুরুর স্ল্যাশ রিমুভড) -->
  <select id="librarySelect" class="library-select">
    <option value="library1/note_app_svg_icon_pack.zip">📝 Note App SVG Icon Pack</option>
    <option value="library1/premium_svg_heavy_pack_v3.zip">💎 Premium SVG Heavy Pack V3</option>
    <option value="library1/svg-icon-pack-part1.zip">📦 SVG Icon Pack (Part 1)</option>
    <option value="library1/svg-icon-pack-part2.zip">📦 SVG Icon Pack (Part 2)</option>
  </select>
  <div class="status-badge" id="globalStatus">⏳ লাইব্রেরি লোড হচ্ছে...</div>
</div>

<header class="library-header" style="display:none;" id="mainHeader">
  <div class="title-badge">
    <h1>🎨 SVG Icon Library</h1>
    <span class="badge" id="iconCounter">— icons</span>
  </div>
  
  <div class="category-strip" id="categoryStrip">
    <div id="categoryList"></div>
  </div>
  
  <div class="controls">
    <input type="text" id="searchInput" class="search-input" placeholder="🔍 আইকন খুঁজুন (যেমন: heart, home)">
    <div class="btn-group">
      <button id="shuffleBtn" class="btn btn-primary">🎲 শাফল</button>
      <button id="loadMoreBtn" class="btn">⤵ আরও</button>
    </div>
  </div>
  <div class="info-tag">✅ যেকোনো আইকনে ট্যাপ করলেই SVG কোড কপি হয়ে যাবে</div>
</header>

<main>
  <div id="iconGrid" class="icon-grid"></div>
  <div id="statusMessage" class="status-area"></div>
  <div id="loadMoreHint" class="load-more-hint"></div>
</main>

<div id="toastMsg" class="toast">📋 কপি হয়েছে!</div>

<script>
  (function() {
    const librarySelect = document.getElementById('librarySelect');
    const globalStatus = document.getElementById('globalStatus');
    const mainHeader = document.getElementById('mainHeader');
    const gridContainer = document.getElementById('iconGrid');
    const statusDiv = document.getElementById('statusMessage');
    const iconCounterSpan = document.getElementById('iconCounter');
    const searchInput = document.getElementById('searchInput');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    const categoryListDiv = document.getElementById('categoryList');
    const toastEl = document.getElementById('toastMsg');
    const loadMoreHint = document.getElementById('loadMoreHint');
    
    let zipArchive = null;
    let allSvgPaths = [];
    let categoryMap = new Map();
    let uniqueCategories = [];
    let activeCategory = 'all';
    let filteredPaths = [];
    let displayList = [];
    let loadedCount = 0;
    let isLoadingBatch = false;
    const BATCH_SIZE = 30;

    function showToast(msg, duration = 1500) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    function extractCategoryFromPath(filePath) {
      let parts = filePath.split('/');
      parts.pop(); 
      if (parts.length > 0) {
        let lastFolder = parts[parts.length - 1];
        if (lastFolder === 'svg-icon-pack' || lastFolder === 'library1' || lastFolder.toLowerCase().includes('icon')) {
          return 'General';
        }
        let cleanName = lastFolder.replace(/^\d+[-_]/, '');
        return cleanName.split(/[-_]/).map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
      }
      return 'General';
    }

    function buildCategories(paths) {
      const catMap = new Map();
      const catSet = new Set();
      for (let p of paths) {
        let cat = extractCategoryFromPath(p);
        catMap.set(p, cat);
        catSet.add(cat);
      }
      let sorted = Array.from(catSet).sort((a, b) => a.localeCompare(b));
      return { catMap, categories: sorted };
    }

    function renderCategoryBtns(categories) {
      categoryListDiv.innerHTML = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'cat-btn active';
      allBtn.innerText = '📁 সব';
      allBtn.dataset.cat = 'all';
      allBtn.addEventListener('click', () => setActiveCategory('all'));
      categoryListDiv.appendChild(allBtn);
      
      for (let cat of categories) {
        let btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.innerText = `📂 ${cat}`;
        btn.dataset.cat = cat;
        btn.addEventListener('click', () => setActiveCategory(cat));
        categoryListDiv.appendChild(btn);
      }
    }

    function setActiveCategory(cat) {
      activeCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(btn => {
        if (btn.dataset.cat === cat) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      applyFilters();
    }

    function applyFilters() {
      if (!allSvgPaths.length) return;
      let temp = [...allSvgPaths];
      if (activeCategory !== 'all') {
        temp = temp.filter(p => categoryMap.get(p) === activeCategory);
      }
      const term = searchInput.value.trim().toLowerCase();
      if (term) {
        temp = temp.filter(p => p.split('/').pop().toLowerCase().includes(term));
      }
      filteredPaths = temp;
      displayList = [...filteredPaths];
      loadedCount = 0;
      gridContainer.innerHTML = '';
      updateStatsUI();
      if (displayList.length) renderNextBatch();
      else statusDiv.innerHTML = '😕 কোনো আইকন খুঁজে পাওয়া যায়নি।';
    }

    function updateStatsUI() {
      const total = displayList.length;
      iconCounterSpan.innerText = `${total.toLocaleString()} icons`;
      if (total === 0) statusDiv.innerHTML = '🔍 মিলছে না — ফিল্টার পরিবর্তন করুন।';
      else statusDiv.innerHTML = `✨ ${total} টি আইকন ফিল্টার করা হয়েছে`;
    }

    async function renderNextBatch() {
      if (!zipArchive || isLoadingBatch) return;
      if (loadedCount >= displayList.length) {
        if (displayList.length > 0) loadMoreHint.innerHTML = `✔️ সব আইকন লোড হয়েছে।`;
        else loadMoreHint.innerHTML = '';
        return;
      }
      isLoadingBatch = true;
      const start = loadedCount;
      const end = Math.min(loadedCount + BATCH_SIZE, displayList.length);
      const batch = displayList.slice(start, end);
      const fragment = document.createDocumentFragment();
      
      for (let filePath of batch) {
        const fileName = filePath.split('/').pop();
        const card = document.createElement('div');
        card.className = 'icon-card';
        
        const img = document.createElement('img');
        img.style.opacity = '0';
        
        const nameSpan = document.createElement('div');
        nameSpan.className = 'icon-name';
        nameSpan.innerText = fileName.replace('.svg', '');
        
        const badge = document.createElement('div');
        badge.className = 'copy-badge';
        badge.innerText = '✓';
        
        card.appendChild(img);
        card.appendChild(nameSpan);
        card.appendChild(badge);
        
        try {
          const svgFile = zipArchive.file(filePath);
          if (svgFile) {
            const svgString = await svgFile.async('string');
            if (svgString && svgString.includes('<svg')) {
              const encoded = encodeURIComponent(svgString).replace(/\(/g, '%28').replace(/\)/g, '%29');
              img.src = `data:image/svg+xml;charset=utf-8,${encoded}`;
              img.onload = () => img.style.opacity = '1';
              img.onerror = () => { img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" fill="%2388aaff" viewBox="0 0 24 24"%3E%3Cpath d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15h-2v-2h2v2zm0-4h-2V7h2v6z"/%3E%3C/svg%3E'; img.style.opacity='0.7'; };
            } else throw new Error();
          } else throw new Error();
        } catch(e) {
          img.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" fill="%23aaaaff" viewBox="0 0 24 24"%3E%3Cpath d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/%3E%3C/svg%3E';
          img.style.opacity = '0.8';
        }
        
        const copyHandler = async (e) => {
          e.preventDefault();
          e.stopPropagation();
          try {
            const raw = await zipArchive.file(filePath).async('string');
            await navigator.clipboard.writeText(raw);
            card.classList.add('copied-flash');
            showToast(`✅ কপিড: ${fileName}`, 1000);
            setTimeout(() => card.classList.remove('copied-flash'), 1000);
          } catch(err) {
            showToast(`❌ কপি ব্যর্থ হয়েছে`, 1000);
          }
        };

        card.addEventListener('click', copyHandler);
        fragment.appendChild(card);
      }
      gridContainer.appendChild(fragment);
      loadedCount = end;
      isLoadingBatch = false;
      
      const remaining = displayList.length - loadedCount;
      if (remaining > 0) loadMoreHint.innerHTML = `⬇️ নিচে স্ক্রল করুন বা 'আরও' বাটনে চাপুন (বাকি ${remaining}টি)`;
      else loadMoreHint.innerHTML = `🎉 সব ${displayList.length} টি আইকন লোড সম্পন্ন!`;
    }
    
    function shuffleDisplay() {
      if (displayList.length <= 1) return showToast('শাফল করার মতো আইকন নেই', 1000);
      for (let i = displayList.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [displayList[i], displayList[j]] = [displayList[j], displayList[i]];
      }
      loadedCount = 0;
      gridContainer.innerHTML = '';
      renderNextBatch();
      showToast('🎲 শাফল করা হয়েছে!', 1000);
    }
    
    function manualLoadMore() {
      if (zipArchive && loadedCount < displayList.length) renderNextBatch();
      else showToast('সব আইকন ইতিমধ্যে লোড হয়েছে', 800);
    }
    
    function scrollHandler() {
      if (!zipArchive || isLoadingBatch) return;
      const scrollY = window.scrollY || document.documentElement.scrollTop;
      const winH = window.innerHeight;
      const docH = document.documentElement.scrollHeight;
      if (scrollY + winH >= docH - 400) {
        if (loadedCount < displayList.length) renderNextBatch();
      }
    }
    
    // গিটহাব পেজেস ফ্রেন্ডলি ফাইল লোডার
    async function loadSelectedZip(url) {
      globalStatus.innerText = `⏳ ফাইল ডাউনলোড হচ্ছে...`;
      statusDiv.innerHTML = `📦 লাইব্রেরি প্রস্তুত করা হচ্ছে, একটু অপেক্ষা করুন...`;
      gridContainer.innerHTML = '';
      categoryListDiv.innerHTML = '';
      loadMoreHint.innerHTML = '';
      mainHeader.style.display = 'none';
      
      try {
        // গিটহাবের ক্যাশিং ইস্যু এড়াতে একটি র্যান্ডম কুয়েরি প্যারামিটার যোগ করা হয়েছে
        const cleanUrl = url + '?v=' + Math.random();
        const response = await fetch(cleanUrl);
        
        if (!response.ok) {
          throw new Error(`সার্ভার রেসপন্স কোড: ${response.status}`);
        }
        
        const arrayBuffer = await response.arrayBuffer();
        zipArchive = await JSZip.loadAsync(arrayBuffer);
        const allEntries = Object.keys(zipArchive.files);
        
        allSvgPaths = allEntries.filter(f => {
          return f.toLowerCase().endsWith('.svg') && !f.includes('__MACOSX') && !f.startsWith('.') && !f.includes('README');
        }).sort();

        if (allSvgPaths.length === 0) {
          throw new Error('জিপ ফাইলের ভেতর কোনো .svg ফাইল পাওয়া যায়নি।');
        }
        
        const { catMap, categories } = buildCategories(allSvgPaths);
        categoryMap = catMap;
        uniqueCategories = categories;
        renderCategoryBtns(uniqueCategories);
        
        activeCategory = 'all';
        filteredPaths = [...allSvgPaths];
        displayList = [...allSvgPaths];
        loadedCount = 0;
        searchInput.value = '';
        
        mainHeader.style.display = 'block';
        globalStatus.innerText = `✅ মোট আইকন: ${allSvgPaths.length} টি`;
        updateStatsUI();
        renderNextBatch();
        
      } catch (err) {
        console.error(err);
        globalStatus.innerText = `❌ লোড ব্যর্থ হয়েছে`;
        statusDiv.innerHTML = `⚠️ <b>লোড হতে পারেনি!</b><br>পাথ বা ফাইল সাইজের কারণে সমস্যা হতে পারে। নিশ্চিত করুন আপনার গিটহাব রিপোজিটরিতে <code>${url}</code> ফাইলটি পুশ করা আছে এবং ফাইলের নামের বানান ঠিক আছে।`;
        mainHeader.style.display = 'none';
      }
    }
    
    shuffleBtn.addEventListener('click', () => { if (displayList.length) shuffleDisplay(); });
    loadMoreBtn.addEventListener('click', manualLoadMore);
    searchInput.addEventListener('input', applyFilters);
    window.addEventListener('scroll', scrollHandler);
    
    librarySelect.addEventListener('change', (e) => {
      loadSelectedZip(e.target.value);
    });
    
    // স্টার্টআপ লোড
    loadSelectedZip(librarySelect.value);
  })();
</script>
</body>
</html>
